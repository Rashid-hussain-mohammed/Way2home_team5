name: Frontend CI

on:
  push:
    branches: [ main ]
    paths: [ apps/frontend/** ]

jobs:
  build-and-deploy:
    name: Test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/run-node
        with:
          service-name: frontend
          command: build
